<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0f1420" />
  <title>RespawnHQ — Kiosk</title>
  <link rel="icon" type="image/svg+xml" href="/img/logo.svg" />
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/css/kiosk.css" />
</head>
<body class="kiosk-body">
  <div id="kiosk-root">
    <header class="kiosk-header">
      <div class="topbar-title"><img class="topbar-logo" src="/img/logo.svg" alt="" width="32" height="32" /> <span class="brand-title">RespawnHQ</span></div>
      <div class="row" style="gap:14px;">
        <span id="kiosk-clock" class="kiosk-clock"></span>
      </div>
    </header>

    <div id="kiosk-broadcast" class="kiosk-broadcast" hidden></div>
    <div id="kiosk-food-banner" class="kiosk-food-banner" hidden></div>

    <main id="kiosk-dashboard" class="kiosk-grid">
      <section class="kiosk-card">
        <h2>📡 Live-Status</h2>
        <div id="kiosk-live"><div class="empty-state">Lädt…</div></div>
      </section>

      <section class="kiosk-card">
        <h2>🗳️ Abstimmung</h2>
        <div id="kiosk-votes"><div class="empty-state">Lädt…</div></div>
      </section>

      <section class="kiosk-card">
        <h2>🏆 Rangliste</h2>
        <div id="kiosk-leaderboard"><div class="empty-state">Lädt…</div></div>
      </section>

      <section class="kiosk-card">
        <h2 id="kiosk-tournament-title"><svg class="ui-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m14.5 17.5-11-11V3h3.5l11 11"/><path d="m13 19 6-6"/><path d="m16 16 4 4"/><path d="m19 19 2 2"/><path d="m14.5 6.5 4-3.5H21v3.5l-3.5 3.5"/><path d="m5 14 4 4"/><path d="m7 17-3 3"/><path d="m3 19 2 2"/></svg> Turnier</h2>
        <div id="kiosk-tournament"><div class="empty-state">Lädt…</div></div>
      </section>
    </main>
    <section id="kiosk-game" class="kiosk-game" hidden aria-live="polite">
      <div class="kiosk-game-header"><h1 id="kiosk-game-title">Arcade</h1><span id="kiosk-game-status"></span></div>
      <div id="kiosk-game-content" class="kiosk-game-content"></div>
    </section>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script type="module" src="/js/kiosk.js"></script>
</body>
</html>
