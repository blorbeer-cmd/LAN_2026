<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0f1420" />
  <title>Respawn — Kiosk</title>
  <link rel="icon" type="image/svg+xml" href="/img/logo.svg" />
  <link rel="stylesheet" href="/css/style.css?v=6" />
  <link rel="stylesheet" href="/css/kiosk.css" />
</head>
<body class="kiosk-body">
  <div id="kiosk-root">
    <header class="kiosk-header">
      <div class="topbar-title"><img class="topbar-logo" src="/img/logo.svg" alt="" width="32" height="32" /> <span class="brand-title">Respawn</span></div>
      <div class="row" style="gap:14px;">
        <span id="kiosk-clock" class="kiosk-clock"></span>
      </div>
    </header>

    <div id="kiosk-alerts" class="kiosk-alerts" hidden>
      <div id="kiosk-broadcast" class="kiosk-broadcast" hidden></div>
    </div>

    <main id="kiosk-dashboard" class="kiosk-grid">
      <section class="kiosk-card">
        <h2><span data-domain-icon="live"></span> Live-Status</h2>
        <div id="kiosk-live"><div class="empty-state">Lädt…</div></div>
      </section>

      <section class="kiosk-card">
        <h2><span data-domain-icon="leaderboard"></span> Rangliste</h2>
        <div id="kiosk-leaderboard"><div class="empty-state">Lädt…</div></div>
      </section>

      <section class="kiosk-card">
        <h2><span data-domain-icon="votes"></span> Abstimmung</h2>
        <div id="kiosk-votes"><div class="empty-state">Lädt…</div></div>
      </section>

      <section class="kiosk-card">
        <h2 id="kiosk-tournament-title"><span data-domain-icon="tournaments"></span> Turnier</h2>
        <div id="kiosk-tournament"><div class="empty-state">Lädt…</div></div>
      </section>
    </main>
    <section id="kiosk-game" class="kiosk-game" hidden aria-live="polite">
      <div class="kiosk-game-header"><h1 id="kiosk-game-title">Arcade</h1><span id="kiosk-game-status"></span></div>
      <div id="kiosk-game-content" class="kiosk-game-content"></div>
    </section>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script type="module" src="/js/kiosk.js"></script>
</body>
</html>
