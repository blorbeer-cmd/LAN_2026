<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f1420" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="RespawnHQ" />
  <title>RespawnHQ</title>
  <link rel="icon" type="image/svg+xml" href="/img/logo.svg" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="apple-touch-icon" href="/img/apple-touch-icon.png" />
  <!-- bump ?v= when the stylesheet changes so no cached copy survives a reload -->
  <link rel="stylesheet" href="/css/style.css?v=4" />
</head>
<body>
  <div id="login-screen" class="login-screen" hidden>
    <form id="login-form" class="login-card">
      <img class="login-logo" src="/img/logo.svg" alt="" width="72" height="72" />
      <h1 class="brand-title">RespawnHQ</h1>
      <p class="muted">Zugangs-Token eingeben, um fortzufahren.</p>
      <input id="login-token" type="password" inputmode="text" autocomplete="off" placeholder="Token" autofocus />
      <button type="submit" class="btn btn-primary">Beitreten</button>
      <p id="login-error" class="error-text" hidden></p>
    </form>
  </div>

  <!-- Real per-user login/register/claim gate (see
       docs/KONZEPT-USER-MANAGEMENT.md, public/js/authGate.js). Only ever
       shown when the server reports authMode: 'required' via /api/meta —
       stays empty and hidden otherwise, so nothing changes for today's
       shared-token-only deployments. Content is rendered into it by
       authGate.js, not hardcoded here, since which form (login/register/
       claim) applies depends on the URL the visitor arrived with. -->
  <div id="auth-screen" class="login-screen" hidden></div>

  <div id="app" class="app" hidden>
    <header class="topbar">
      <a class="topbar-title" href="/" aria-label="Zur Landingpage">
        <img class="topbar-logo" src="/img/logo.svg" alt="" width="30" height="30" />
        <span class="brand-title">RespawnHQ</span>
      </a>
      <div class="topbar-actions">
        <button id="group-btn" class="group-switcher" type="button" aria-label="Gruppe wechseln" title="Gruppe wechseln" hidden>
          <svg class="ui-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          <span id="group-btn-label"></span>
        </button>
        <button id="profile-btn" class="icon-btn" aria-label="Mein Profil" title="Mein Profil"><svg class="ui-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="10" r="3"/><path d="M7 20.66a8 8 0 0 1 10 0"/></svg></button>
        <button id="settings-btn" class="icon-btn" aria-label="Spiele verwalten" title="Spiele verwalten"><svg class="ui-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.38a2 2 0 0 0-.73-2.73l-.15-.09a2 2 0 0 1-1-1.74v-.51a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2Z"/><circle cx="12" cy="12" r="3"/></svg></button>
        <a id="github-link" class="icon-btn github-icon-btn" href="https://github.com/blorbeer-cmd/LAN_2026" target="_blank" rel="noopener" aria-label="GitHub Repository" title="GitHub Repository">
          <svg viewBox="0 0 24 24" aria-hidden="true" class="github-icon">
            <path fill="currentColor" d="M12 2C6.48 2 2 6.59 2 12.25c0 4.53 2.87 8.37 6.84 9.73.5.09.68-.22.68-.49v-1.91c-2.78.62-3.37-1.21-3.37-1.21-.45-1.18-1.11-1.5-1.11-1.5-.91-.64.07-.63.07-.63 1 .07 1.53 1.06 1.53 1.06.9 1.57 2.35 1.12 2.92.85.09-.67.35-1.12.63-1.38-2.22-.26-4.56-1.14-4.56-5.06 0-1.12.39-2.03 1.03-2.75-.1-.26-.45-1.3.1-2.71 0 0 .84-.28 2.75 1.05A9.28 9.28 0 0 1 12 6.96c.85 0 1.7.12 2.5.35 1.9-1.33 2.74-1.05 2.74-1.05.55 1.41.2 2.45.1 2.71.64.72 1.03 1.63 1.03 2.75 0 3.93-2.34 4.8-4.57 5.05.36.32.68.95.68 1.92v2.8c0 .27.18.59.69.49A10.2 10.2 0 0 0 22 12.25C22 6.59 17.52 2 12 2Z" />
          </svg>
        </a>
      </div>
    </header>

    <div id="admin-banner" class="admin-banner" hidden>
      <span class="admin-banner-label">
        <svg class="ui-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/></svg>
        Admin-Modus aktiv – Test-Spieler sichtbar
      </span>
      <button type="button" id="admin-banner-leave" class="btn btn-sm">Verlassen</button>
    </div>

    <div id="notification-banner" class="notification-banner" hidden></div>

    <main id="view-container" class="view-container"></main>

    <nav class="bottom-nav" aria-label="Hauptnavigation">
      <div class="bottom-nav-inner">
        <button class="nav-btn" data-view="home" aria-label="Home">
          <span class="nav-icon"><svg class="ui-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M15 21v-8a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v8"/><path d="M3 10a2 2 0 0 1 .709-1.528l7-5.999a2 2 0 0 1 2.582 0l7 5.999A2 2 0 0 1 21 10v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg></span><span class="nav-label">Home</span>
        </button>
        <button class="nav-btn" data-view="tournaments" aria-label="Turniere">
          <span class="nav-icon"><svg class="ui-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="14.5 17.5 3 6 3 3 6 3 17.5 14.5"/><line x1="13" x2="19" y1="19" y2="13"/><line x1="16" x2="20" y1="16" y2="20"/><line x1="19" x2="21" y1="21" y2="19"/><polyline points="14.5 6.5 18 3 21 3 21 6 17.5 9.5"/><line x1="5" x2="9" y1="14" y2="18"/><line x1="7" x2="4" y1="17" y2="20"/><line x1="3" x2="5" y1="19" y2="21"/></svg></span><span class="nav-label">Turniere</span>
        </button>
        <button class="nav-btn" data-view="matchmaking" aria-label="Teams">
          <span class="nav-icon"><svg class="ui-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m16 16 3-8 3 8a5 5 0 0 1-6 0"/><path d="m2 16 3-8 3 8a5 5 0 0 1-6 0"/><path d="M7 21h10"/><path d="M12 3v18"/><path d="M3 7h18"/></svg></span><span class="nav-label">Teams</span>
        </button>
        <button class="nav-btn" data-view="votes" aria-label="Abstimmung">
          <span class="nav-icon"><svg class="ui-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg></span><span class="nav-label">Vote</span>
        </button>
        <button class="nav-btn" data-view="leaderboard" aria-label="Rangliste">
          <span class="nav-icon"><svg class="ui-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-1 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98 1 1.21 1.15.54 2 2.03 2 3.79"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg></span><span class="nav-label">Rang</span>
        </button>
        <button class="nav-btn" data-view="more" aria-label="Mehr">
          <span class="nav-icon"><svg class="ui-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 12h16"/><path d="M4 6h16"/><path d="M4 18h16"/></svg></span><span class="nav-label">Mehr</span>
        </button>
      </div>
    </nav>
  </div>

  <div id="toast-container" class="toast-container" aria-live="polite"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script type="module" src="/js/app.js"></script>
</body>
</html>
