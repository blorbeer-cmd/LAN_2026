<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f1420" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Respawn" />
  <title>Respawn</title>
  <link rel="icon" type="image/svg+xml" href="/img/logo.svg" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="apple-touch-icon" href="/img/apple-touch-icon.png" />
  <!-- bump ?v= when the stylesheet changes so no cached copy survives a reload -->
  <link rel="stylesheet" href="/css/style.css?v=37" />
</head>
<body>
  <div id="login-screen" class="login-screen" hidden>
    <form id="login-form" class="login-card">
      <img class="login-logo" src="/img/logo.svg" alt="" width="72" height="72" />
      <h1 class="brand-title">Respawn</h1>
      <p class="muted">Zugangs-Token eingeben, um fortzufahren.</p>
      <input id="login-token" type="password" inputmode="text" autocomplete="off" placeholder="Token" autofocus />
      <button type="submit" class="btn btn-primary">Beitreten</button>
      <p id="login-error" class="error-text" hidden></p>
    </form>
  </div>

  <!-- Real per-user login/register/claim gate (see
       docs/KONZEPT-USER-MANAGEMENT.md, public/js/authGate.js). Only ever
       shown when the server reports authMode: 'required' via /api/meta —
       stays empty and hidden otherwise, so nothing changes for today's
       shared-token-only deployments. Content is rendered into it by
       authGate.js, not hardcoded here, since which form (login/register/
       claim) applies depends on the URL the visitor arrived with. -->
  <div id="auth-screen" class="login-screen" hidden></div>

  <div id="app" class="app" hidden>
    <header class="topbar">
      <a class="topbar-title" href="/" aria-label="Zur Landingpage">
        <img class="topbar-logo" src="/img/logo.svg" alt="" width="30" height="30" />
        <span class="brand-title">Respawn</span>
      </a>
      <div class="topbar-actions">
        <button id="global-search-btn" class="icon-btn" type="button" aria-label="Bereiche und Tools durchsuchen" aria-keyshortcuts="Control+K Meta+K" title="Suchen (Strg/⌘ K)"></button>
        <button id="group-btn" class="group-switcher" type="button" aria-label="Gruppe wechseln" title="Gruppe wechseln" hidden>
          <span id="group-btn-label"></span>
        </button>
        <div class="notification-center" data-notification-center>
          <button id="notifications-btn" class="icon-btn" aria-label="Mitteilungen" aria-controls="notifications-panel" aria-expanded="false" title="Mitteilungen">
            <span id="notifications-count" class="notification-count" hidden></span>
          </button>
          <div id="notifications-panel" class="notification-center-panel" role="region" aria-label="Mitteilungen" hidden></div>
        </div>
        <button id="profile-btn" class="icon-btn" aria-label="Mein Profil" title="Mein Profil"></button>
        <button id="settings-btn" class="icon-btn" aria-label="Einstellungen" title="Einstellungen"></button>
      </div>
    </header>

    <aside id="notification-highlight" class="notification-highlight" aria-label="Aktuelle Mitteilung" hidden></aside>

    <div id="admin-banner" class="admin-banner" hidden>
      <span class="admin-banner-label">
        Admin-Modus aktiv – Test-Spieler sichtbar
      </span>
      <button type="button" id="admin-banner-leave" class="btn btn-sm">Verlassen</button>
    </div>

    <main id="view-container" class="view-container"></main>

    <nav class="bottom-nav" aria-label="Hauptnavigation">
      <div class="bottom-nav-inner">
        <button class="nav-btn" data-view="home" aria-label="Home">
          <span class="nav-icon" data-domain-icon="home"></span><span class="nav-label">Home</span>
        </button>
        <button class="nav-btn" data-view="tournaments" aria-label="Turniere">
          <span class="nav-icon" data-domain-icon="tournaments"></span><span class="nav-label">Turniere</span>
        </button>
        <button class="nav-btn" data-view="matchmaking" aria-label="Teams">
          <span class="nav-icon" data-domain-icon="matchmaking"></span><span class="nav-label">Teams</span>
        </button>
        <button class="nav-btn" data-view="votes" aria-label="Abstimmung">
          <span class="nav-icon" data-domain-icon="votes"></span><span class="nav-label">Vote</span>
        </button>
        <button class="nav-btn" data-view="leaderboard" aria-label="Rangliste">
          <span class="nav-icon" data-domain-icon="leaderboard"></span><span class="nav-label">Rang</span>
        </button>
        <button class="nav-btn" data-view="more" aria-label="Mehr">
          <span class="nav-icon" data-domain-icon="more"></span><span class="nav-label">Mehr</span>
        </button>
      </div>
    </nav>
  </div>

  <div id="toast-container" class="toast-container" aria-live="polite"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script type="module" src="/js/app.js"></script>
</body>
</html>
