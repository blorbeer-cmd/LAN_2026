<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="RespawnHQ">
  <defs>
    <linearGradient id="rhq-badge" x1="4" y1="2" x2="116" y2="118" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6d9dff" />
      <stop offset="0.55" stop-color="#9163f5" />
      <stop offset="1" stop-color="#ef5da8" />
    </linearGradient>
    <linearGradient id="rhq-beam" x1="60" y1="20" x2="60" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.98" />
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.4" />
    </linearGradient>
    <linearGradient id="rhq-sheen" x1="60" y1="6" x2="60" y2="60" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.22" />
      <stop offset="1" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>
  </defs>

  <rect x="4" y="4" width="112" height="112" rx="32" fill="url(#rhq-badge)" />
  <!-- glass sheen across the top half, for a bit of app-icon depth -->
  <rect x="4" y="4" width="112" height="56" rx="32" fill="url(#rhq-sheen)" />

  <!-- respawn beacon: two descending chevrons dropping the player back in -->
  <circle cx="60" cy="46" r="31" fill="#ffffff" opacity="0.08" />
  <path d="M36,22 60,37 84,22 84,31 60,46 36,31 Z" fill="#ffffff" opacity="0.5" />
  <path d="M41,39 60,54 79,39 79,49 60,64 41,49 Z" fill="url(#rhq-beam)" />

  <!-- controller -->
  <rect x="24" y="66" width="72" height="38" rx="19" fill="#f8faff" />
  <rect x="36" y="80" width="15" height="4.5" rx="2.25" fill="url(#rhq-badge)" />
  <rect x="42" y="74.5" width="4.5" height="15" rx="2.25" fill="url(#rhq-badge)" />
  <circle cx="70" cy="79" r="4.2" fill="url(#rhq-badge)" />
  <circle cx="80" cy="88.5" r="4.2" fill="url(#rhq-badge)" />

  <!-- pixel sparks: a small retro nod without depicting any specific game -->
  <rect x="10" y="88" width="6" height="6" fill="#ffffff" opacity="0.55" />
  <rect x="18" y="80" width="4" height="4" fill="#ffffff" opacity="0.4" />
  <rect x="100" y="30" width="6" height="6" fill="#ffffff" opacity="0.5" />
</svg>
