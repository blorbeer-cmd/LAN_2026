<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="Respawn">
  <defs>
    <linearGradient id="rhq-badge" x1="2" y1="0" x2="118" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7fb4ff" />
      <stop offset="0.38" stop-color="#7c6bff" />
      <stop offset="0.7" stop-color="#c15be6" />
      <stop offset="1" stop-color="#ff5fa8" />
    </linearGradient>
    <linearGradient id="rhq-beam" x1="60" y1="19" x2="60" y2="66" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="1" />
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.45" />
    </linearGradient>
    <linearGradient id="rhq-sheen" x1="60" y1="4" x2="60" y2="62" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.3" />
      <stop offset="1" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>
    <radialGradient id="rhq-glow" cx="50%" cy="36%" r="62%">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.4" />
      <stop offset="1" stop-color="#ffffff" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- ambient glow behind the badge, for extra pop at larger sizes -->
  <circle cx="60" cy="58" r="58" fill="url(#rhq-glow)" />

  <rect x="4" y="4" width="112" height="112" rx="30" fill="url(#rhq-badge)" />
  <rect x="5" y="5" width="110" height="110" rx="29" fill="none" stroke="#ffffff" stroke-opacity="0.28" stroke-width="1.6" />
  <!-- glass sheen across the top half, for a bit of app-icon depth -->
  <rect x="4" y="4" width="112" height="58" rx="30" fill="url(#rhq-sheen)" />

  <!-- respawn beacon: two descending chevrons dropping the player back in -->
  <circle cx="60" cy="45" r="32" fill="#ffffff" opacity="0.1" />
  <path d="M34,21 60,37 86,21 86,31 60,47 34,31 Z" fill="#ffffff" opacity="0.55" />
  <path d="M40,39 60,55 80,39 80,50 60,66 40,50 Z" fill="url(#rhq-beam)" />

  <!-- controller -->
  <rect x="22" y="66" width="76" height="40" rx="20" fill="#f9fbff" />
  <rect x="35" y="81" width="16" height="4.6" rx="2.3" fill="url(#rhq-badge)" />
  <rect x="41" y="75" width="4.6" height="16" rx="2.3" fill="url(#rhq-badge)" />
  <circle cx="72" cy="80" r="4.4" fill="url(#rhq-badge)" />
  <circle cx="83" cy="90" r="4.4" fill="url(#rhq-badge)" />

  <!-- energy sparks: a bit more motion/flair than a plain badge -->
  <rect x="7" y="90" width="7.5" height="7.5" fill="#ffffff" opacity="0.6" transform="rotate(14 10.75 93.75)" />
  <rect x="17" y="79" width="4.5" height="4.5" fill="#ffffff" opacity="0.42" transform="rotate(14 19.25 81.25)" />
  <rect x="98" y="24" width="7.5" height="7.5" fill="#ffffff" opacity="0.58" transform="rotate(-12 101.75 27.75)" />
  <circle cx="106" cy="47" r="2.6" fill="#ffffff" opacity="0.45" />
</svg>
