name: CI/CD

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # 24 (current Active LTS) — matches server/Dockerfile. Also fixes
          # a real bug: npm test's `node --test "<glob>"` needs the test
          # runner's own glob support, a semver-major feature added in 21
          # and never backported to 20 — Node 20 fails with "Could not find
          # 'dist-test/*.test.js'" (verified by reproducing it locally).
          node-version: 24
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm test
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        run: |
          IMAGE="ghcr.io/${{ github.repository }}"
          echo "image=${IMAGE,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: ./server
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ github.sha }}
            ${{ steps.meta.outputs.image }}:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    # Only one deploy against the single production box at a time. Two
    # pushes close together would otherwise both SSH in and race on the
    # same `.env`/`docker compose` state — queue the second instead of
    # running it in parallel (test/build-and-push above stay unaffected,
    # only this job serializes). Not scoped to a branch/sha on purpose:
    # there's exactly one production target, so every deploy shares the
    # same lock regardless of which commit triggered it.
    concurrency:
      group: production-deploy
      cancel-in-progress: false
    steps:
      # Pinning the box to this exact sha (not a floating :latest tag) keeps
      # deploys reproducible and makes infra/cloud-init.yaml.tpl's
      # rollback.sh consistent: the next normal push here overwrites
      # whatever sha a manual rollback pinned to.
      - uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: deploy
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            cd /opt/lan2026
            sed -i "s#^IMAGE=.*#IMAGE=${{ needs.build-and-push.outputs.image }}:${{ github.sha }}#" .env
            docker compose pull app
            docker compose up -d app
            docker image prune -af --filter "until=720h"
