name: CI/CD

on:
  push:
    branches: [main]
    # Pull requests still run the complete CI below. Once a docs-only PR is
    # merged, do not rebuild and restart production for Markdown that cannot
    # change the shipped image.
    paths-ignore:
      - "docs/**"
      - "**/*.md"
  pull_request:
  workflow_dispatch:
    inputs:
      deploy:
        description: Build, publish and deploy after successful tests
        required: true
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  test:
    name: Build and test
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          # 24 (current Active LTS) — matches server/Dockerfile. Also fixes
          # a real bug: npm test's `node --test "<glob>"` needs the test
          # runner's own glob support, a semver-major feature added in 21
          # and never backported to 20 — Node 20 fails with "Could not find
          # 'dist-test/*.test.js'" (verified by reproducing it locally).
          node-version: 24
          cache: npm
          cache-dependency-path: |
            server/package-lock.json
            agent/package-lock.json
      - run: npm ci
      - name: Check design tokens
        shell: bash
        env:
          EVENT_BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          base_ref="$EVENT_BASE_SHA"
          if [[ -z "$base_ref" || "$base_ref" =~ ^0+$ ]]; then
            base_ref="origin/$DEFAULT_BRANCH"
          fi
          npm run check:tokens -- --base-ref "$base_ref"
      - name: Lint server and frontend
        run: npm run lint
      - name: Check tool configuration formatting
        run: npm run format:check
      - run: npm run build
      - run: npm test
      - name: Install agent dependencies
        working-directory: agent
        run: npm ci
      - name: Test agent
        working-directory: agent
        run: npm test
      - name: Lint agent
        working-directory: agent
        run: npm run lint
      - name: Test agent-server integration
        working-directory: agent
        run: npm run test:e2e
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.deploy)
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        run: |
          IMAGE="ghcr.io/${{ github.repository }}"
          echo "image=${IMAGE,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v7
        with:
          context: ./server
          # Pull requests build the exact runtime image as a deployment
          # gate, but only main/manual deploy runs may publish it.
          push: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.deploy) }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ steps.meta.outputs.image }}:${{ github.sha }}
            ${{ steps.meta.outputs.image }}:latest

  deploy:
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.deploy)
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: production
      url: https://lan.dbehnke.dev
    # Only one deploy against the single production box at a time. Two
    # pushes close together would otherwise both SSH in and race on the
    # same `.env`/`docker compose` state — queue the second instead of
    # running it in parallel (test/build-and-push above stay unaffected,
    # only this job serializes). Not scoped to a branch/sha on purpose:
    # there's exactly one production target, so every deploy shares the
    # same lock regardless of which commit triggered it.
    concurrency:
      group: production-deploy
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v7

      # Keep the live service definition in sync as deploy safeguards (for
      # example logging limits) evolve; secrets remain exclusively in the
      # server-side .env and are never copied from the repository.
      - uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: deploy
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: docker-compose.yml
          target: /opt/lan2026
          overwrite: true

      # Pinning the box to this exact sha (not a floating :latest tag) keeps
      # deploys reproducible and makes infra/cloud-init.yaml.tpl's
      # rollback.sh consistent: the next normal push here overwrites
      # whatever sha a manual rollback pinned to.
      - uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: deploy
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            cd /opt/lan2026
            previous_image="$(sed -n 's/^IMAGE=//p' .env)"
            next_image="${{ needs.build-and-push.outputs.image }}:${{ github.sha }}"
            sed -i "s#^IMAGE=.*#IMAGE=${next_image}#" .env
            if ! docker compose pull app || ! docker compose up -d --wait --wait-timeout 90 app; then
              docker compose ps app || true
              docker compose logs --tail=100 app || true
              if [ -n "$previous_image" ] && [ "$previous_image" != "$next_image" ]; then
                echo "Deploy failed; restoring previous image."
                sed -i "s#^IMAGE=.*#IMAGE=${previous_image}#" .env
                docker compose up -d --wait --wait-timeout 90 app || true
                docker compose ps app || true
              fi
              exit 1
            fi
            docker compose ps app
            docker image prune -af --filter "until=720h"
