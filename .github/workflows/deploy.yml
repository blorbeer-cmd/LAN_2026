name: CI/CD

on:
  push:
    branches: [main]
    # Pull requests still run the path classifier below. Once a docs-only PR
    # is merged, do not rebuild and restart production for Markdown that
    # cannot change the shipped image.
    paths-ignore:
      - "docs/**"
      - "**/*.md"
  pull_request:
  workflow_dispatch:
    inputs:
      deploy:
        description: Build, publish and deploy after successful tests
        required: true
        type: boolean
        default: false

permissions:
  contents: read

# A newer push to the same branch supersedes the running checks — except on
# main, where an in-flight run may already be deploying and must finish.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

# The former single "Build and test" job ran every check back to back and made
# each merge wait for the full serial chain. The mandatory checks are unchanged
# but now run as parallel jobs; the runtime image builds alongside them and is
# only published (and deployed) after every check has passed.
jobs:
  changes:
    name: Classify changed paths
    runs-on: ubuntu-latest
    outputs:
      server: ${{ steps.filter.outputs.server }}
      e2e: ${{ steps.filter.outputs.e2e }}
      agent: ${{ steps.filter.outputs.agent }}
      image: ${{ steps.filter.outputs.image }}
      deploy: ${{ steps.filter.outputs.deploy }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Select required work
        id: filter
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          server=false
          e2e=false
          agent=false
          image=false
          deploy=false

          select_all() {
            server=true
            e2e=true
            agent=true
            image=true
            deploy=true
          }

          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            select_all
          else
            base="$BASE_SHA"
            if [[ -z "$base" || "$base" =~ ^0+$ ]]; then
              base="$(git rev-parse "$HEAD_SHA^" 2>/dev/null || true)"
            fi

            if [[ -z "$base" ]] ||
              ! git cat-file -e "$base^{commit}" 2>/dev/null ||
              ! git cat-file -e "$HEAD_SHA^{commit}" 2>/dev/null; then
              echo "Unable to resolve diff range; selecting all work." >&2
              select_all
            else
              changed_files="$(mktemp)"
              if git diff --no-renames --name-only -z "$base" "$HEAD_SHA" > "$changed_files"; then
                while IFS= read -r -d '' file; do
                  case "$file" in
                    server/*)
                      select_all
                      ;;
                    agent/*)
                      agent=true
                      ;;
                    docker-compose.yml)
                      image=true
                      deploy=true
                      ;;
                    .nvmrc | .github/workflows/*)
                      select_all
                      ;;
                    docs/* | *.md)
                      # Known documentation-only paths need no runtime checks.
                      ;;
                    *)
                      # New root or infrastructure paths are safety-sensitive
                      # until they are explicitly classified above.
                      select_all
                      ;;
                  esac
                done < "$changed_files"
              else
                echo "Unable to calculate changed paths; selecting all work." >&2
                select_all
              fi
              rm -f "$changed_files"
            fi
          fi

          echo "server=$server" >> "$GITHUB_OUTPUT"
          echo "e2e=$e2e" >> "$GITHUB_OUTPUT"
          echo "agent=$agent" >> "$GITHUB_OUTPUT"
          echo "image=$image" >> "$GITHUB_OUTPUT"
          echo "deploy=$deploy" >> "$GITHUB_OUTPUT"
          printf 'Selected work: server=%s e2e=%s agent=%s image=%s deploy=%s\n' \
            "$server" "$e2e" "$agent" "$image" "$deploy"

  server-checks:
    name: Server lint, build and tests
    needs: changes
    if: needs.changes.outputs.server == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v7
        with:
          # check:tokens diffs against the branch base, which needs history.
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          # 24 (current Active LTS) — matches server/Dockerfile. Also fixes
          # a real bug: npm test's `node --test "<glob>"` needs the test
          # runner's own glob support, a semver-major feature added in 21
          # and never backported to 20 — Node 20 fails with "Could not find
          # 'dist-test/*.test.js'" (verified by reproducing it locally).
          node-version: 24
          cache: npm
          cache-dependency-path: server/package-lock.json
      # npm's download cache still leaves npm ci rebuilding all 432 packages
      # (~90 seconds on the hosted runner). Cache the installed tree behind an
      # exact platform/Node/lockfile key; a dependency change still forces a
      # clean npm ci, while ordinary PR and post-merge runs restore it directly.
      - name: Cache installed server dependencies
        id: server-node-modules
        uses: actions/cache@v4
        with:
          path: server/node_modules
          key: server-node-modules-${{ runner.os }}-${{ runner.arch }}-node24-${{ hashFiles('server/package-lock.json') }}
      - run: npm ci
        if: steps.server-node-modules.outputs.cache-hit != 'true'
      - name: Check design tokens
        shell: bash
        env:
          EVENT_BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          base_ref="$EVENT_BASE_SHA"
          if [[ -z "$base_ref" || "$base_ref" =~ ^0+$ ]]; then
            base_ref="origin/$DEFAULT_BRANCH"
          fi
          npm run check:tokens -- --base-ref "$base_ref"
      - name: Lint server and frontend
        run: npm run lint
      - name: Check tool configuration formatting
        run: npm run format:check
      - run: npm run build
      - run: npm test

  e2e:
    name: Browser E2E
    needs: changes
    if: needs.changes.outputs.e2e == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: server/package-lock.json
      - name: Cache installed server dependencies
        id: server-node-modules
        uses: actions/cache@v4
        with:
          path: server/node_modules
          key: server-node-modules-${{ runner.os }}-${{ runner.arch }}-node24-${{ hashFiles('server/package-lock.json') }}
      - run: npm ci
        if: steps.server-node-modules.outputs.cache-hit != 'true'
      # Restoring Chromium is faster than pulling the Playwright container;
      # the pinned-container benchmark added ~45 seconds before tests and also
      # lacked the toolchain needed to build better-sqlite3 on a cache miss.
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('server/package-lock.json') }}
      - name: Install Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
      - name: Install Chromium system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
      # test:e2e builds the server itself before starting it.
      - run: npm run test:e2e

  agent:
    name: Agent lint and tests
    needs: changes
    if: needs.changes.outputs.agent == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            server/package-lock.json
            agent/package-lock.json
      # The agent-server integration test drives the real built server.
      - name: Cache installed server dependencies
        id: server-node-modules
        uses: actions/cache@v4
        with:
          path: server/node_modules
          key: server-node-modules-${{ runner.os }}-${{ runner.arch }}-node24-${{ hashFiles('server/package-lock.json') }}
      - name: Install server dependencies
        if: steps.server-node-modules.outputs.cache-hit != 'true'
        working-directory: server
        run: npm ci
      - name: Build server for the integration test
        working-directory: server
        run: npm run build
      - name: Install agent dependencies
        working-directory: agent
        run: npm ci
      - name: Lint agent
        working-directory: agent
        run: npm run lint
      - name: Test agent
        working-directory: agent
        run: npm test
      - name: Test agent-server integration
        working-directory: agent
        run: npm run test:e2e

  # Builds the exact runtime image on every run as a deployment gate (also on
  # pull requests), in parallel with the checks above. Nothing is published
  # here — the publish job below re-uses this build via the shared layer
  # cache once all checks are green.
  image:
    name: Build runtime image
    needs: changes
    if: needs.changes.outputs.image == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # This non-publishing gate needs neither the downloadable BuildKit record
      # nor an attestation. The publish build below keeps its default provenance.
      DOCKER_BUILD_RECORD_UPLOAD: false
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: ./server
          push: false
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Publishing stays gated on every check: a push to main publishes and
  # deploys automatically, a manual run only with the explicit deploy=true
  # input. The image itself comes out of the layer cache written by the
  # parallel build above, so this job is quick.
  publish:
    if: >-
      always() &&
      needs.changes.outputs.deploy == 'true' &&
      needs.changes.result == 'success' &&
      (needs.server-checks.result == 'success' || needs.server-checks.result == 'skipped') &&
      (needs.e2e.result == 'success' || needs.e2e.result == 'skipped') &&
      (needs.agent.result == 'success' || needs.agent.result == 'skipped') &&
      needs.image.result == 'success' &&
      (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.deploy))
    needs: [changes, server-checks, e2e, agent, image]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        run: |
          IMAGE="ghcr.io/${{ github.repository }}"
          echo "image=${IMAGE,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v7
        with:
          context: ./server
          push: true
          cache-from: type=gha
          tags: |
            ${{ steps.meta.outputs.image }}:${{ github.sha }}
            ${{ steps.meta.outputs.image }}:latest

  deploy:
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.deploy)
    needs: publish
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: production
      url: https://lan.dbehnke.dev
    # Only one deploy against the single production box at a time. Two
    # pushes close together would otherwise both SSH in and race on the
    # same `.env`/`docker compose` state — queue the second instead of
    # running it in parallel (the check jobs above stay unaffected, only
    # this job serializes). Not scoped to a branch/sha on purpose: there's
    # exactly one production target, so every deploy shares the same lock
    # regardless of which commit triggered it.
    concurrency:
      group: production-deploy
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v7

      # Preserve the existing production data on the first deploy after the
      # product rename. Later deploys simply keep using the new directory.
      - uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: deploy
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            if [ ! -d /opt/respawn ] && [ -d /opt/lan2026 ]; then
              sudo mv /opt/lan2026 /opt/respawn
            fi
            sudo mkdir -p /opt/respawn
            sudo chown -R deploy:deploy /opt/respawn

            # One-time cleanup for the pre-rename stack: Compose infers its
            # project name from the containing directory, so the move above
            # left any already-running lan2026-project containers (in
            # particular cloudflared, which the deploy step below only ever
            # restarts by service name within the *current* directory)
            # orphaned on their own "lan2026_default" network, unable to
            # reach the app container the next step creates on
            # "respawn_default". docker-compose.yml now pins an explicit
            # project name so this can't recur. Idempotent: a no-op once
            # these are gone.
            docker ps -aq --filter "label=com.docker.compose.project=lan2026" | xargs -r docker rm -f
            docker network ls -q --filter "label=com.docker.compose.project=lan2026" | xargs -r docker network rm

      # Keep the live service definition in sync as deploy safeguards (for
      # example logging limits) evolve; secrets remain exclusively in the
      # server-side .env and are never copied from the repository.
      - uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: deploy
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: docker-compose.yml
          target: /opt/respawn
          overwrite: true

      # Pinning the box to this exact sha (not a floating :latest tag) keeps
      # deploys reproducible and makes infra/cloud-init.yaml.tpl's
      # rollback.sh consistent: the next normal push here overwrites
      # whatever sha a manual rollback pinned to.
      - uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: deploy
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            cd /opt/respawn
            previous_image="$(sed -n 's/^IMAGE=//p' .env)"
            next_image="${{ needs.publish.outputs.image }}:${{ github.sha }}"
            sed -i "s#^IMAGE=.*#IMAGE=${next_image}#" .env
            # Also (re)attach cloudflared on every deploy, not just app: cheap
            # and idempotent when it's already healthy, and self-heals it onto
            # the pinned project/network if it was ever left stranded (see the
            # cleanup step above) instead of requiring a manual fix.
            if ! docker compose pull app || ! docker compose up -d --wait --wait-timeout 90 app cloudflared; then
              docker compose ps app || true
              docker compose logs --tail=100 app || true
              if [ -n "$previous_image" ] && [ "$previous_image" != "$next_image" ]; then
                echo "Deploy failed; restoring previous image."
                sed -i "s#^IMAGE=.*#IMAGE=${previous_image}#" .env
                docker compose up -d --wait --wait-timeout 90 app cloudflared || true
                docker compose ps app || true
              fi
              exit 1
            fi
            docker compose ps
            # 720h (30 days) let the disk fill up: at this repo's merge
            # velocity (often dozens of deploys/day, each publishing a new
            # uniquely sha-tagged image) that's easily hundreds of accumulated
            # images before anything gets swept. 24h matches the retention
            # policy of the nightly "Ops - Disk Cleanup" workflow, which also
            # covers days with no deploy at all. For an already-full disk,
            # run that workflow directly instead of waiting for the next
            # deploy's prune to catch up.
            docker image prune -af --filter "until=24h"
