name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true

jobs:
  server-and-agent:
    name: Server and agent
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            server/package-lock.json
            agent/package-lock.json

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Check design tokens
        working-directory: server
        shell: bash
        env:
          EVENT_BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          base_ref="$EVENT_BASE_SHA"
          if [[ -z "$base_ref" || "$base_ref" =~ ^0+$ ]]; then
            base_ref="origin/$DEFAULT_BRANCH"
          fi
          npm run check:tokens -- --base-ref "$base_ref"

      - name: Build server
        working-directory: server
        run: npm run build

      - name: Test server
        working-directory: server
        run: npm test

      - name: Install agent dependencies
        working-directory: agent
        run: npm ci

      - name: Test agent
        working-directory: agent
        run: npm test

      - name: Test agent-server integration
        working-directory: agent
        run: npm run test:e2e

  browser-e2e:
    name: Browser E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Install Chromium
        working-directory: server
        run: npx playwright install --with-deps chromium

      - name: Run browser E2E tests
        working-directory: server
        run: npm run test:e2e
